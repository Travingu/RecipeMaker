<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients Input - DataDishes</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="camera.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">DataDishes</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="camera.html">Camera</a></li>
                <li><a href="ingredients.html">Ingredients</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Type Your <span>Ingredients</span></h1>
            <p>Enter the ingredients you have available, and we'll generate delicious recipes for you.</p>
        </section>

        <div class="ingredients-container">
            <form id="ingredients-form">
                <label for="ingredients-input">List your ingredients (one per line or comma-separated):</label>
                <textarea id="ingredients-input" rows="10" placeholder="e.g., chicken, rice, tomatoes, onions, garlic"></textarea>
                <button type="submit" class="btn">Generate Recipes</button>
            </form>

            <div id="recipe-panel" class="recipe-panel">
                <div class="recipe-header">
                    <h1>Generated Recipes</h1>
                    <button class="close-panel-btn" id="close-panel-btn">×</button>
                </div>
                <div class="recipe-content" id="recipe-content">
                    <!-- Recipes will be inserted here -->
                </div>
            </div>
        </div>
    </main>

</body>
</html>
