<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dishes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">DataDishes</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#ingredients" class="active">Ingredients</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Home Section -->
        <section class="hero" id="home-section">
            <h1>Welcome to <span>Data Dishes</span></h1>
            <p>Enter in Ingredients and we will generate tasty recipes for you to enjoy.</p>
            <div class="hero-buttons">
                <a href="#ingredients" class="btn secondary">Enter Ingredients</a>
            </div>
        </section>

        <!-- Ingredients Section -->
        <section class="hero" id="ingredients">
            <h1>Type Your <span>Ingredients</span></h1>
            <p>Enter the ingredients you have available, and we'll generate delicious recipes for you.</p>
        </section>

        <div class="ingredients-container">
            <form id="ingredients-form">
                <label for="ingredients-input">List your ingredients (one per line or comma-separated):</label>
                <textarea id="ingredients-input" rows="10" placeholder="e.g., chicken, rice, tomatoes, onions, garlic"></textarea>
                <button type="submit" class="btn">Generate Recipes</button>
            </form>
            
            <div id="recipe-panel" class="recipe-panel">
                <div class="recipe-header">
                    <h1>Generated Recipes</h1>
                    <button class="close-panel-btn" id="close-panel-btn">×</button>
                </div>
                <div class="recipe-content" id="recipe-content">
                    <!-- Recipes will be inserted here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Function to display the Ollama response on the webpage
        function displayRecipeResponse(responseText) {
            const recipeContent = document.getElementById('recipe-content');
            
            // Format the response with line breaks for better readability
            const formattedText = responseText
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            
            recipeContent.innerHTML = `<div class="recipe-result">${formattedText}</div>`;
        }

        // Handle ingredients form submission
        document.getElementById('ingredients-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const ingredients = document.getElementById('ingredients-input').value.trim();
            if (!ingredients) {
                alert('Please enter some ingredients');
                return;
            }

            const recipeContent = document.getElementById('recipe-content');
            const recipePanel = document.getElementById('recipe-panel');
            
            // Show loading state
            recipePanel.classList.add('open');
            recipeContent.innerHTML = '<div class="loading">Analyzing your ingredients and generating recipes...</div>';

            console.log('Generating response');

            try {
                const response = await fetch('http://localhost:11434/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'codellama',
                        prompt: `I have the following ingredients: ${ingredients}. What recipes can I make with these? Please provide the full recipe including ingredients list, cooking time, serving size, and step-by-step instructions.`,
                        stream: false
                    })
                });
                
                const data = await response.json();
                console.log('Ollama Response:', data);
                
                // Display the response on the webpage
                displayRecipeResponse(data.response);

            } catch (error) {
                console.error('Error generating recipes:', error);
                recipeContent.innerHTML = '<div class="error">Sorry, there was an error generating recipes. Please try again.</div>';
            }
        });

       

        // Smooth scroll to ingredients section when clicking the button
        document.querySelector('a[href="#ingredients"]').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('ingredients').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
